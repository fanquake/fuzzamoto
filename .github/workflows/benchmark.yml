name: Benchmark

# A/B benchmark of two fuzzamoto-libafl versions: run each version N times for a fixed
# duration in parallel, then aggregate and statistically compare the campaigns.
#
# Build stages (so campaigns never recompile - 2 builds total instead of 2*N):
#   - build-base:   builds the version-independent base image (Bitcoin Core + AFL++ +
#     toolchain) and pushes it to the runs-on ephemeral ECR registry, tagged by the hash
#     of its build inputs so it is reused across runs AND branches (ECR is org-shared,
#     unlike branch-scoped gha cache - which is why the base used to rebuild every PR).
#   - build-fuzzer: per version, FROM the base, bakes that ref's compiled fuzzer + Nyx
#     share dir (Dockerfile.libafl.bench) and pushes a per-version image to ECR.
#   - campaign: just `docker pull`s its per-version image - no build, no recompile.
# Bitcoin Core (the target) is identical across both arms, so the comparison isolates the
# fuzzer change. See ci/benchmark-evaluation.py for the metrics.
#
# Requires the runs-on stack's Ephemeral Registry feature (the `ecr-cache` extra auto-logs
# the runner into ECR before each job). Runner specs are inlined in each job's `runs-on:`
# label (runs-on.com syntax); there is no .github/runs-on.yml. Campaign runners are pinned
# to a single exact instance type so every campaign runs on identical hardware.
#
# Triggers (PR labels only - the workflow always compares PR base vs head):
#   - PR label 'needs benchmark':        full run, N=10, 3600s/campaign.
#   - PR label 'needs benchmark smoke':  cheap wiring test, N=2, 300s/campaign.

on:
  pull_request:
    # Gated on the 'needs benchmark' / 'needs benchmark smoke' labels (checked in setup's `if:`).
    types: [labeled]

permissions:
  contents: read # read-only: this workflow runs untrusted fork PR code, so it must not
  # hold a write token. The PR comment is posted by the separate benchmark-comment.yml,
  # which triggers on workflow_run in the trusted base-repo context (GitHub's recommended
  # pattern for commenting on fork PRs).

jobs:
  setup:
    if: github.event.label.name == 'needs benchmark' || github.event.label.name == 'needs benchmark smoke'
    runs-on:
      - runs-on=${{ github.run_id }}
      - cpu=2+4
      - family=m7i+c7i
      - image=ubuntu22-full-x64
      - extras=s3-cache
    outputs:
      baseline: ${{ steps.refs.outputs.baseline }}
      experiment: ${{ steps.refs.outputs.experiment }}
      # Human-readable labels for the report header. The baseline/experiment outputs
      # above must stay checkout-able refs (used as `ref:` in build-fuzzer), so the
      # display labels are tracked separately.
      baseline_label: ${{ steps.refs.outputs.baseline_label }}
      experiment_label: ${{ steps.refs.outputs.experiment_label }}
      duration: ${{ steps.refs.outputs.duration }}
      runs_json: ${{ steps.refs.outputs.runs_json }} # e.g. "[1,2,...,10]"
      spot: ${{ steps.refs.outputs.spot }} # true for smoke tests, false for real benchmarks
    steps:
      - id: refs
        run: |
          # Real benchmarks run on-demand (spot=false) so an interruption can't void a long
          # campaign; the cheap smoke test runs on spot to save money.
          SPOT=false
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "baseline=$BASE_SHA"  >> "$GITHUB_OUTPUT"
          echo "experiment=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          # e.g. "master (a1b2c3d4e5f6)" / "my-feature (0f1e2d3c4b5a)"
          echo "baseline_label=${{ github.event.pull_request.base.ref }} (${BASE_SHA:0:12})"   >> "$GITHUB_OUTPUT"
          echo "experiment_label=${{ github.event.pull_request.head.ref }} (${HEAD_SHA:0:12})" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.label.name }}" = "needs benchmark smoke" ]; then
            N=2
            echo "duration=300" >> "$GITHUB_OUTPUT"
            SPOT=true
          else
            N=10
            echo "duration=3600" >> "$GITHUB_OUTPUT"
          fi
          echo "spot=$SPOT" >> "$GITHUB_OUTPUT"
          echo "runs_json=$(seq -s, 1 "$N" | sed 's/^/[/;s/$/]/')" >> "$GITHUB_OUTPUT"

  build-base:
    needs: setup
    # Build the version-independent base image (Bitcoin Core + AFL++ + deps) and push it to
    # ECR, tagged by the hash of its build inputs so it is reused across runs and branches.
    # The registry build cache keeps re-runs fast when those inputs are unchanged.
    runs-on:
      - runs-on=${{ github.run_id }}
      - cpu=16+32
      - family=c7i+m7i+c7a
      - image=ubuntu22-full-x64
      - volume=120gb:gp3
      - extras=ecr-cache # auto-login to the ephemeral ECR registry
      - spot=${{ needs.setup.outputs.spot }}
    outputs:
      base_image: ${{ steps.meta.outputs.base_image }}
    steps:
      - uses: actions/checkout@v4 # Bitcoin Core build is version-independent
      - id: meta
        # Content-addressed tag: rebuilt only when the base build inputs actually change.
        run: echo "base_image=${{ env.RUNS_ON_ECR_CACHE }}:base-${{ hashFiles('Dockerfile.libafl', 'target-patches/**', 'ci/**') }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build & push the base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.libafl
          push: true
          tags: ${{ steps.meta.outputs.base_image }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ env.RUNS_ON_ECR_CACHE }}:base-buildcache
          cache-to: type=registry,ref=${{ env.RUNS_ON_ECR_CACHE }}:base-buildcache,mode=max

  build-fuzzer:
    needs: [setup, build-base]
    # Bake each fuzzer version (compiled binary + Nyx share dir) FROM the base image and push
    # a per-version image to ECR, so campaigns just pull it. Only compiles the fuzzamoto
    # crates (the heavy base is prebuilt), so 8 CPUs is plenty and spot is fine - a reclaim
    # mid-bake just retries and resumes from the registry build cache.
    runs-on:
      - runs-on=${{ github.run_id }}
      - cpu=8
      - family=c7i+m7i+c7a
      - image=ubuntu22-full-x64
      - volume=120gb:gp3
      - extras=ecr-cache
      - spot=${{ needs.setup.outputs.spot }}
      - retry=when-interrupted
    strategy:
      matrix:
        version: [baseline, experiment]
    steps:
      - name: Checkout fuzzer version to bake
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version == 'baseline' && needs.setup.outputs.baseline || needs.setup.outputs.experiment }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push the per-version fuzzer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.libafl.bench
          build-args: BASE_IMAGE=${{ needs.build-base.outputs.base_image }}
          push: true
          tags: ${{ env.RUNS_ON_ECR_CACHE }}:bench-${{ github.run_id }}-${{ matrix.version }}
          cache-from: type=registry,ref=${{ env.RUNS_ON_ECR_CACHE }}:bench-${{ matrix.version }}-buildcache
          cache-to: type=registry,ref=${{ env.RUNS_ON_ECR_CACHE }}:bench-${{ matrix.version }}-buildcache,mode=max

  campaign:
    needs: [setup, build-fuzzer]
    # nested-virt exposes /dev/kvm (required by Nyx). IMPORTANT: pinned to a single,
    # exact instance type so every campaign (both arms, all N runs) runs on identical
    # hardware - otherwise a coverage/exec-rate delta could reflect instance variance
    # rather than the fuzzer change. Always on-demand (spot=false) so an interruption
    # can never void a campaign, even for the cheap smoke test.
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=r7i.large # exact type; adjust to one nested-virt type in your account
      - image=ubuntu22-full-x64
      - nested-virt
      - volume=80gb:gp3
      - extras=ecr-cache
      - spot=${{ needs.setup.outputs.spot }}
    timeout-minutes: 90 # 60m campaign + image-pull headroom
    strategy:
      fail-fast: false # a dead campaign must not cancel the others
      matrix:
        version: [baseline, experiment]
        run: ${{ fromJSON(needs.setup.outputs.runs_json) }}
    steps:
      - name: Pull prebuilt fuzzer image
        # $RUNS_ON_ECR_CACHE is exported into the step env by the runs-on pre-job hook.
        run: docker pull "$RUNS_ON_ECR_CACHE:bench-${{ github.run_id }}-${{ matrix.version }}"
      - name: Enable KVM vmware backdoor (required by Nyx)
        run: |
          sudo modprobe -r kvm_intel 2>/dev/null || true
          sudo modprobe -r kvm 2>/dev/null || true
          sudo modprobe kvm enable_vmware_backdoor=y
          sudo modprobe kvm_intel
          echo "enable_vmware_backdoor=$(cat /sys/module/kvm/parameters/enable_vmware_backdoor)"
          test "$(cat /sys/module/kvm/parameters/enable_vmware_backdoor)" = "Y"
      - name: Run campaign
        run: |
          rm -rf /tmp/out && mkdir -p /tmp/out
          # Source/binary are baked into the image (no source mount); only mount the output
          # dir. --privileged exposes the host's /dev (incl. /dev/kvm for Nyx), so no
          # separate --device=/dev/kvm is needed.
          docker run --privileged \
            -e BENCH_DURATION=${{ needs.setup.outputs.duration }} \
            -v /tmp/out:/tmp/out \
            "$RUNS_ON_ECR_CACHE:bench-${{ github.run_id }}-${{ matrix.version }}" \
            just -f /ci/libafl.justfile bench_run
      - name: Collect results
        run: |
          mkdir -p artifact
          # All per-core snapshot files (one per core; aggregated per campaign downstream).
          cp /tmp/out/bench/bench-cpu_*.csv artifact/ \
            || echo "no bench csv (campaign may have died early)"
          # Crashes from every core.
          for c in /tmp/out/cpu_*/crashes; do
            [ -d "$c" ] || continue
            core=$(basename "$(dirname "$c")")
            cp -r "$c" "artifact/crashes-$core" 2>/dev/null || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.version }}-${{ matrix.run }}
          path: artifact
          retention-days: 14

  compare:
    needs: [setup, campaign]
    if: always()
    # Lightweight runner for report aggregation; does not affect measurements.
    runs-on:
      - runs-on=${{ github.run_id }}
      - cpu=2+4
      - family=m7i+c7i
      - image=ubuntu22-full-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: dl
      - name: Arrange into baseline/experiment layout
        run: |
          shopt -s nullglob
          for d in dl/bench-baseline-*; do
            n=${d##*-}; mkdir -p results/baseline/ir/$n
            cp "$d"/bench-cpu_*.csv results/baseline/ir/$n/ 2>/dev/null || true
          done
          for d in dl/bench-experiment-*; do
            n=${d##*-}; mkdir -p results/experiment/ir/$n
            cp "$d"/bench-cpu_*.csv results/experiment/ir/$n/ 2>/dev/null || true
          done
      - name: Install evaluation dependencies
        run: pip install numpy pandas matplotlib seaborn scipy statsmodels tabulate
      - name: Evaluate
        run: |
          python3 ci/benchmark-evaluation.py results --out report --hours min \
            --baseline-label "${{ needs.setup.outputs.baseline_label }}" \
            --experiment-label "${{ needs.setup.outputs.experiment_label }}"
          {
            echo "## fuzzamoto-libafl benchmark"
            echo
            cat report/evaluation_report.md
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: report
          retention-days: 90
      - name: Save PR number for the comment workflow
        # Fork PRs carry an empty workflow_run.pull_requests, so the trusted comment
        # workflow can't recover the PR number from the event - we stash it here and it
        # reads it back from this artifact.
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr
          echo "${{ github.event.pull_request.number }}" > pr/pr-number.txt
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: pr-number
          path: pr
          retention-days: 14
